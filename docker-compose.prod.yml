name: ai-adventurer-app-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    working_dir: /app
    command: uv run python app.py
    environment:
      APP_ENV: production
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    ports:
      - "18000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "18080:80"
    depends_on:
      - backend
    restart: unless-stopped
