services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-adventurer-app-backend-dev
    working_dir: /app
    command: uv run python app.py
    environment:
      APP_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_TIMEOUT_S: 120
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-adventurer-app-frontend-dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 80
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      DOCKER_DEV: "1"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "120"
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
