services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: uv run python app.py
    environment:
      APP_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 80
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      DOCKER_DEV: "1"
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
